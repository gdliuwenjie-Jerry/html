<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>产权证明及备案表生成器</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.37.11/build/docxtemplater.js"></script>

    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #2b2b2b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 22px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #cfcfcf;
        }
        input {
            background-color: #383838;
            border: 1px solid #4a4a4a;
            color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px; 
            outline: none;
        }
        input:focus {
            border-color: #3b82f6; 
        }
        input::placeholder {
            color: #888888;
        }
        button {
            width: 100%;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #218838;
        }
        button:disabled {
            background-color: #5a6268;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 产权证明及备案表生成器</h2>

    <div class="form-group">
        <label>姓名 *</label>
        <input type="text" id="name" placeholder="如：张三">
    </div>
    <div class="form-group">
        <label>项目地址</label>
        <input type="text" id="address" placeholder="详细地址">
    </div>
    <div class="form-group">
        <label>手机号</label>
        <input type="text" id="phone" placeholder="联系电话">
    </div>
    <div class="form-group">
        <label>身份证号</label>
        <input type="text" id="id_card" placeholder="输入18位身份证号">
    </div>
    <div class="form-group">
        <label>占地面积 (㎡)</label>
        <input type="text" id="area" placeholder="单位：㎡">
    </div>
    <div class="form-group">
        <label>层数</label>
        <input type="text" id="floors" placeholder="如：3">
    </div>
    <div class="form-group">
        <label>房屋建筑面积 (㎡)</label>
        <input type="text" id="build_area" placeholder="单位：㎡">
    </div>
    <div class="form-group">
        <label>房屋建成日期</label>
        <input type="text" id="build_date" placeholder="仅填年份，如：2020">
    </div>

    <button id="generateBtn" onclick="generateDoc()">⚡ 一键生成文档</button>
</div>

    function base64ToArrayBuffer(base64) {
        const cleanBase64 = base64.replace(/[^A-Za-z0-9\+\/\=]/g, "");
        const binaryString = window.atob(cleanBase64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    function generateDoc() {
        const btn = document.getElementById("generateBtn");
        btn.innerText = "⏳ 正在生成中，请稍候...";
        btn.disabled = true;

        // 延迟执行以确保按钮文字有时间刷新
        setTimeout(() => {
            try {
                var ua = navigator.userAgent.toLowerCase();
                var isIOS = /iphone|ipad|ipod/.test(ua);

                if (ua.match(/MicroMessenger/i) == "micromessenger") {
                    alert("⚠️ 微信内置浏览器不支持下载文件！\n\n请点击屏幕右上角的【...】图标，选择【在浏览器打开】或【在 Safari 中打开】。");
                    return;
                }

                const name = document.getElementById('name').value.trim();
                if (!name) {
                    alert("⚠️ 请至少填写【姓名】！");
                    return;
                }

                let buildDate = document.getElementById('build_date').value.trim();
                if (buildDate && /^\d+$/.test(buildDate)) {
                    buildDate += "年";
                }

                const data = {
                    "姓名": name,
                    "地址": document.getElementById('address').value.trim(),
                    "手机号": document.getElementById('phone').value.trim(),
                    "身份证号": document.getElementById('id_card').value.trim(),
                    "占地面积": document.getElementById('area').value.trim(),
                    "层数": document.getElementById('floors').value.trim(),
                    "房屋建筑面积": document.getElementById('build_area').value.trim(),
                    "房屋建成日期": buildDate
                };

                if(TEMPLATE_B64 === "在此处粘贴" || TEMPLATE_B64.length < 100) {
                    throw new Error("请先将完整的 Base64 代码粘贴到文件里！");
                }

                const zip = new PizZip(base64ToArrayBuffer(TEMPLATE_B64));
                
                const doc = new window.docxtemplater(zip, {
                    paragraphLoop: true,
                    linebreaks: true,
                });

                doc.render(data);

                const blob = doc.getZip().generate({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    compression: "DEFLATE",
                });

                const outFileName = name + "-产权证明及备案表.docx";

                if (window.navigator && window.navigator.msSaveOrOpenBlob) {
                    window.navigator.msSaveOrOpenBlob(blob, outFileName);
                } else if (isIOS) {
                    // ⚠️ 终极兼容：苹果手机 Edge/Chrome 浏览器无反应的克星
                    // 将文件数据转换成 Base64 链接，绕过苹果的屏蔽机制
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const a = document.createElement('a');
                        a.href = e.target.result;
                        a.download = outFileName;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    };
                    reader.readAsDataURL(blob);
                } else {
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = outFileName;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(function() {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(url);
                    }, 1000);
                }

            } catch (error) {
                alert("❌ 生成失败！\n\n错误详情：" + error.message);
            } finally {
                // 无论成功还是失败，恢复按钮状态
                btn.innerText = "⚡ 一键生成文档";
                btn.disabled = false;
            }
        }, 100);
    }
</script>
