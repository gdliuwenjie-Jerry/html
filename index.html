<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>业务与计算工具箱 · 专业版</title>

    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.28.5/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater-image-module-free@1.1.1/build/imagemodule.min.js"></script>

    <style>
        :root {
            --bg: #0b0b0f;
            --surface: #15151a;
            --surface2: #1e1e26;
            --surface3: #262630;
            --border: #2a2a36;
            --border-focus: #4f8cff;
            --text: #e2e2e6;
            --text-secondary: #9999a5;
            --text-muted: #6b6b78;
            --accent: #4f8cff;
            --accent-hover: #3d73e0;
            --accent-glow: rgba(79, 140, 255, 0.25);
            --success: #2ed573;
            --success-glow: rgba(46, 213, 115, 0.25);
            --warning: #ffa502;
            --warning-glow: rgba(255, 165, 2, 0.25);
            --danger: #ff4757;
            --danger-glow: rgba(255, 71, 87, 0.25);
            --purple: #6f42c1;
            --teal: #17a2b8;
            --pink: #e84393;
            --radius: 14px;
            --radius-sm: 10px;
            --radius-xs: 6px;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.12s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 12px 40px rgba(0,0,0,0.5);
            --shadow-sm: 0 4px 16px rgba(0,0,0,0.35);
            --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 15% 40%, rgba(79, 140, 255, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 75%, rgba(46, 213, 115, 0.04) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 20%, rgba(255, 165, 2, 0.03) 0%, transparent 50%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            width: 100%;
            max-width: 580px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 30px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 22px;
            transition: box-shadow var(--transition);
        }
        .container:focus-within {
            box-shadow: var(--shadow), 0 0 0 1px rgba(79, 140, 255, 0.15);
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--success), var(--purple), var(--warning));
            opacity: 0.85;
            z-index: 1;
        }
        .header { text-align: center; padding-top: 2px; }
        .header h1 {
            font-size: 21px; font-weight: 700; letter-spacing: 0.4px;
            color: #fff; display: inline-flex; align-items: center; gap: 8px;
            position: relative;
        }
        .header h1 .icon { font-size: 26px; display: inline-block; animation: subtleBounce 2.5s ease-in-out infinite; }
        @keyframes subtleBounce {
            0%,100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
            60% { transform: translateY(0); }
        }
        .header .badge {
            display: inline-block; font-size: 10px; font-weight: 600;
            background: var(--accent); color: #fff; padding: 3px 9px;
            border-radius: 20px; letter-spacing: 0.6px; text-transform: uppercase;
            margin-left: 2px; vertical-align: middle; opacity: 0.85;
        }
        
        .author-signature {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            letter-spacing: 0.5px;
            font-family: var(--font-mono);
        }

        .tabs {
            display: flex; background: var(--surface2); border-radius: 12px;
            padding: 5px; gap: 5px; position: relative; flex-wrap: wrap;
        }
        .tab {
            flex: 1 1 auto; min-width: 80px; text-align: center; padding: 11px 6px; cursor: pointer;
            font-size: 13px; font-weight: 600; color: var(--text-secondary);
            border-radius: 9px; transition: var(--transition-fast); user-select: none;
            position: relative; white-space: nowrap; letter-spacing: 0.3px;
        }
        .tab:hover { color: #ccc; background: rgba(255,255,255,0.04); }
        .tab:active { transform: scale(0.97); }
        .tab.active {
            color: #fff; background: var(--surface3);
            box-shadow: var(--shadow-sm); cursor: default;
        }
        .tab.active::after {
            content: ''; position: absolute; bottom: 2px; left: 50%;
            transform: translateX(-50%); width: 20px; height: 3px;
            background: var(--accent); border-radius: 3px;
        }
        .panel { display: none; animation: fadeSlideIn 0.35s ease; }
        .panel.active { display: block; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .panel-desc {
            font-size: 13px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 14px;
            border-radius: var(--radius-xs);
            margin-bottom: 18px;
            border-left: 3px solid var(--accent);
            line-height: 1.4;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group { margin-bottom: 15px; position: relative; }
        .form-group label {
            display: flex; align-items: center; gap: 5px; font-size: 13px;
            color: #b0b0bb; margin-bottom: 6px; font-weight: 500; letter-spacing: 0.2px;
        }
        .form-group label .required { color: var(--danger); font-weight: 700; font-size: 15px; line-height: 1; }
        .form-group label .hint { font-size: 11px; color: var(--text-muted); font-weight: 400; margin-left: auto; }
        input {
            width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
            color: #fff; padding: 12px 14px; border-radius: var(--radius-xs);
            font-size: 15px; outline: none; transition: var(--transition-fast);
            font-family: inherit; caret-color: var(--accent);
        }
        input::placeholder { color: #4a4a56; opacity: 0.7; }
        input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px var(--accent-glow);
            background: var(--surface3);
        }
        input.input-error {
            border-color: var(--danger);
            box-shadow: 0 0 0 4px var(--danger-glow);
            animation: shake 0.5s ease;
        }
        input.input-valid {
            border-color: var(--success);
            box-shadow: 0 0 0 4px var(--success-glow);
        }
        input[type="file"] {
            padding: 8px 12px; font-size: 13px; color: #b0b0bb;
            background: rgba(255,255,255,0.02); cursor: pointer;
        }
        input[type="file"]::-webkit-file-upload-button {
            background: var(--surface3); color: #fff; border: 1px solid var(--border);
            padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 10px;
            transition: var(--transition-fast);
        }
        input[type="file"]::-webkit-file-upload-button:hover { background: rgba(255,255,255,0.1); }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(0.8);
            cursor: pointer;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            15% { transform: translateX(-6px); }
            30% { transform: translateX(6px); }
            45% { transform: translateX(-4px); }
            60% { transform: translateX(4px); }
            75% { transform: translateX(-2px); }
            90% { transform: translateX(2px); }
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .row { display: flex; gap: 12px; }
        .row .form-group { flex: 1; min-width: 0; }
        
        .section-title {
            margin-top: 5px; margin-bottom: 15px; font-size: 14px;
            color: var(--teal); border-bottom: 1px solid var(--border);
            padding-bottom: 6px; font-weight: 600;
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 7px; padding: 12px 22px; border: none;
            border-radius: var(--radius-xs); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: var(--transition-fast); color: #fff;
            background: var(--accent); width: 100%; letter-spacing: 0.3px;
            position: relative; overflow: hidden; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn::after {
            content: ''; position: absolute; inset: 0; background: transparent;
            transition: background var(--transition-fast); border-radius: inherit;
        }
        .btn:hover::after { background: rgba(255,255,255,0.06); }
        .btn:active { transform: scale(0.975); transition: transform 0.08s ease; }
        .btn:disabled { opacity: 0.5; pointer-events: none; transform: none; cursor: not-allowed; filter: grayscale(20%); }
        .btn .spinner {
            display: none; width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        .btn.loading .spinner { display: inline-block; }
        .btn.loading .btn-text { opacity: 0.7; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-success { background: var(--success); color: #000; font-weight: 700; }
        .btn-success:hover::after { background: rgba(0,0,0,0.08); }
        .btn-info { background: var(--accent); }
        .btn-teal { background: var(--teal); color: #fff; font-weight: 700; }
        .btn-purple { background: var(--purple); color: #fff; font-weight: 700; }
        .btn-pink { background: var(--pink); color: #fff; font-weight: 700; }
        .btn-warning { background: var(--warning); color: #000; font-weight: 700; }
        .btn-warning:hover::after { background: rgba(0,0,0,0.08); }
        .btn-ghost {
            background: transparent; color: var(--text-secondary);
            font-size: 13px; padding: 9px 12px; font-weight: 500;
            border: 1px solid transparent;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.04); color: #ccc; border-color: var(--border); }
        .btn-ghost:active { background: rgba(255,255,255,0.08); }
        .result-card {
            background: var(--surface2); border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); padding: 18px 16px; margin-top: 14px;
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px; font-size: 17px; font-weight: 600; color: var(--success);
            transition: var(--transition); min-height: 58px; flex-wrap: wrap;
        }
        .result-card.error {
            color: var(--danger); border-color: rgba(255,71,87,0.4);
            background: rgba(255,71,87,0.06);
        }
        .result-card .result-value {
            font-family: var(--font-mono); font-size: 22px; font-weight: 700;
            letter-spacing: 0.5px; word-break: break-all;
        }
        .copy-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
            padding: 7px 14px; border-radius: 6px; cursor: pointer;
            font-size: 12px; font-weight: 600; color: #ccc;
            transition: var(--transition-fast); white-space: nowrap; flex-shrink: 0;
        }
        .copy-btn:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.25); color: #fff; }
        .copy-btn:active { transform: scale(0.94); transition: transform 0.06s ease; }
        .copy-btn.copied {
            background: var(--success); border-color: var(--success); color: #000;
            animation: copyPulse 0.5s ease;
        }
        @keyframes copyPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
        .history-list {
            margin-top: 10px; max-height: 180px; overflow-y: auto;
            font-size: 13px; color: var(--text-secondary);
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        .history-list::-webkit-scrollbar { width: 5px; }
        .history-list::-webkit-scrollbar-track { background: transparent; border-radius: 10px; }
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 7px 10px; border-radius: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background var(--transition-fast); gap: 10px;
        }
        .history-item:hover { background: rgba(255,255,255,0.03); }
        .history-item .eq {
            font-family: var(--font-mono); color: #d0d0d0; flex: 1;
            min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .history-item .time { color: #555; font-size: 11px; flex-shrink: 0; }
        .history-item .del-hist {
            background: none; border: none; color: #555; cursor: pointer; font-size: 14px;
            padding: 2px 6px; border-radius: 4px; transition: var(--transition-fast);
            flex-shrink: 0; line-height: 1;
        }
        .history-item .del-hist:hover { color: var(--danger); background: rgba(255,71,87,0.1); }
        .history-empty { text-align: center; padding: 16px; color: var(--text-muted); font-size: 13px; font-style: italic; }
        .toast-container {
            position: fixed; bottom: 24px; right: 24px; z-index: 99999;
            display: flex; flex-direction: column-reverse; gap: 10px;
            pointer-events: none; max-width: 340px;
        }
        .toast {
            padding: 13px 20px; border-radius: 10px; font-size: 14px; font-weight: 500;
            color: #fff; background: #2a2a36;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: toastIn 0.35s cubic-bezier(0.4,0,0.2,1), toastOut 0.3s cubic-bezier(0.4,0,0.2,1) 2.8s forwards;
            pointer-events: auto; letter-spacing: 0.2px;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 8px;
        }
        .toast-success { background: #1a3d2b; border-color: rgba(46,213,115,0.3); color: #2ed573; }
        .toast-error { background: #3d1a1f; border-color: rgba(255,71,87,0.3); color: #ff6b7a; }
        .toast-info { background: #1a2a3d; border-color: rgba(79,140,255,0.3); color: #6ba0ff; }
        .toast-warning { background: #3d2f1a; border-color: rgba(255,165,2,0.3); color: #ffb733; }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(120px) scale(0.9); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0) scale(1); }
            to { opacity: 0; transform: translateX(120px) scale(0.85); }
        }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 99990;
            display: flex; align-items: center; justify-content: center;
            animation: fadeIn 0.2s ease; backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-dialog {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 24px; max-width: 380px;
            width: 90%; box-shadow: var(--shadow); text-align: center;
        }
        .modal-dialog h3 { font-size: 17px; margin-bottom: 8px; color: #fff; }
        .modal-dialog p { font-size: 14px; color: var(--text-secondary); margin-bottom: 18px; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .modal-btns .btn { width: auto; flex: 1; padding: 10px 16px; }
        .modal-btns .btn-cancel { background: var(--surface2); color: #ccc; border: 1px solid var(--border); }
        .modal-btns .btn-cancel:hover { background: var(--surface3); }
        .modal-btns .btn-danger { background: var(--danger); }
        @media (max-width: 520px) {
            .container { padding: 18px 14px; border-radius: var(--radius-sm); gap: 16px; }
            .row { flex-direction: column; gap: 0; }
            .tabs { padding: 3px; gap: 3px; border-radius: 10px; }
            .tab { font-size: 11px; padding: 9px 4px; border-radius: 7px; min-width: 60px; }
            .tab.active::after { width: 14px; height: 2px; }
            input { font-size: 16px; padding: 11px 12px; }
            .btn { font-size: 13px; padding: 11px 16px; }
            .toast-container { bottom: 12px; right: 12px; left: 12px; max-width: none; }
            .toast { font-size: 13px; padding: 11px 16px; }
            .result-card { font-size: 15px; padding: 14px 12px; }
            .result-card .result-value { font-size: 18px; }
            .panel-desc { font-size: 12px; padding: 8px 12px; margin-bottom: 14px; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="container" id="mainContainer">
        <div class="header">
            <h1><span class="icon">🧰</span>业务与计算工具箱<span class="badge">Pro</span></h1>
            <div class="author-signature">Designed by Jerry</div>
        </div>

        <div class="tabs" role="tablist" aria-label="功能切换">
            <div class="tab active" id="tab-property" data-tab="property" role="tab" aria-selected="true">📋 产权表</div>
            <div class="tab" id="tab-commitment" data-tab="commitment" role="tab" aria-selected="false">✍️ 承诺函</div>
            <div class="tab" id="tab-guandu" data-tab="guandu" role="tab" aria-selected="false">📝 官渡房产</div>
            <div class="tab" id="tab-shixing" data-tab="shixing" role="tab" aria-selected="false">🏠 始兴房产</div>
            <div class="tab" id="tab-public-roof" data-tab="public-roof" role="tab" aria-selected="false">🏢 公屋屋顶</div>
            <div class="tab" id="tab-calculator" data-tab="calculator" role="tab" aria-selected="false">🔢 平方根</div>
        </div>

        <div class="panel active" id="panel-property" role="tabpanel" aria-label="产权备案表">
            <div class="panel-desc" style="border-left-color: var(--success);">💡 用于韶关市浈江区项目产权证明和备案表生成</div>
            <form onsubmit="return false;" novalidate>
                <div class="form-group"><label><span class="required">*</span> 姓名</label><input type="text" id="prop_name" placeholder="如：张三" autocomplete="name" maxlength="40"></div>
                <div class="row">
                    <div class="form-group"><label>项目地址</label><input type="text" id="prop_address" placeholder="详细地址" autocomplete="address" maxlength="120"></div>
                    <div class="form-group"><label>手机号 <span class="hint">选填</span></label><input type="tel" id="prop_phone" placeholder="11位手机号" autocomplete="tel" maxlength="11"></div>
                </div>
                <div class="form-group"><label>身份证号 <span class="hint">选填</span></label><input type="text" id="prop_id_card" placeholder="18位身份证号" maxlength="18" autocomplete="off"></div>
                <div class="row">
                    <div class="form-group"><label>占地面积 (㎡)</label><input type="number" id="prop_area" placeholder="㎡" min="0" step="0.01"></div>
                    <div class="form-group"><label>层数</label><input type="number" id="prop_floors" placeholder="层数" min="0" step="any"></div>
                </div>
                <div class="row">
                    <div class="form-group"><label>建筑面积 (㎡)</label><input type="number" id="prop_build_area" placeholder="㎡" min="0" step="0.01"></div>
                    <div class="form-group"><label>建成日期</label><input type="text" id="prop_build_date" placeholder="如：2020" maxlength="8"></div>
                </div>
            </form>
            <button id="btn-property" class="btn btn-success"><span class="spinner"></span><span class="btn-text">⚡ 生成产权及备案表</span></button>
            <button class="btn btn-ghost" id="btn-clear-property">🗑 清空表单</button>
        </div>

        <div class="panel" id="panel-commitment" role="tabpanel" aria-label="装修承诺函">
            <div class="panel-desc" style="border-left-color: var(--accent);">💡 用于装修承诺函生成</div>
            <form onsubmit="return false;" novalidate>
                <div class="form-group"><label><span class="required">*</span> 承诺人姓名</label><input type="text" id="comm_name" placeholder="如：李四" autocomplete="name" maxlength="40"></div>
                <div class="form-group"><label>身份证号 <span class="hint">选填</span></label><input type="text" id="comm_id_card" placeholder="18位身份证号" maxlength="18" autocomplete="off"></div>
                <div class="form-group"><label>项目地址</label><input type="text" id="comm_address" placeholder="详细地址" autocomplete="address" maxlength="120"></div>
            </form>
            <button id="btn-commitment" class="btn btn-info"><span class="spinner"></span><span class="btn-text">⚡ 一键生成承诺函</span></button>
            <button class="btn btn-ghost" id="btn-clear-commitment">🗑 清空表单</button>
        </div>

        <div class="panel" id="panel-guandu" role="tabpanel" aria-label="官渡房产证明">
            <div class="panel-desc" style="border-left-color: var(--teal);">💡 用于翁源县官渡镇房产证明生成</div>
            <form onsubmit="return false;" novalidate>
                <div class="section-title">基本信息</div>
                <div class="form-group"><label><span class="required">*</span> 屋主姓名</label><input type="text" id="gd_name" placeholder="如：张三" autocomplete="name" maxlength="40"></div>
                <div class="form-group"><label>身份证号</label><input type="text" id="gd_id_card" placeholder="18位身份证号" maxlength="18" autocomplete="off"></div>
                <div class="form-group"><label>房屋地址 (地点)</label><input type="text" id="gd_address" placeholder="如：XX村XX号" maxlength="120"></div>

        // ==================== 全局配置 ====================
        const CONFIG = {
            TOAST_DURATION: 3200,
            STORAGE_PREFIX: 'toolbox_pro_',
            MAX_HISTORY: 25,
            DEBOUNCE_SAVE: 350,
            FILENAME_MAX_LEN: 80,
        };

        const $ = (sel, ctx = document) => ctx.querySelector(sel);
        const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

        const Toast = {
            container: document.getElementById('toastContainer'),
            _timerMap: new Map(),
            show(msg, type = 'info', duration = CONFIG.TOAST_DURATION) {
                const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
                const t = document.createElement('div');
                t.className = `toast toast-${type}`;
                t.innerHTML = `<span>${icons[type] || ''}</span> ${msg}`;
                this.container.appendChild(t);
                const timer = setTimeout(() => { t.remove(); this._timerMap.delete(t); }, duration);
                this._timerMap.set(t, timer);
                t.addEventListener('click', () => { clearTimeout(this._timerMap.get(t)); t.remove(); this._timerMap.delete(t); });
                return t;
            },
            success(msg) { return this.show(msg, 'success'); },
            error(msg) { return this.show(msg, 'error'); },
            info(msg) { return this.show(msg, 'info'); },
            warning(msg) { return this.show(msg, 'warning'); },
            dismissAll() {
                this._timerMap.forEach((timer, el) => { clearTimeout(timer); el.remove(); });
                this._timerMap.clear();
            },
        };

        const Storage = {
            _prefix: CONFIG.STORAGE_PREFIX,
            get(key, def = null) {
                try { const v = localStorage.getItem(this._prefix + key); return v ? JSON.parse(v) : def; }
                catch { return def; }
            },
            set(key, value) { try { localStorage.setItem(this._prefix + key, JSON.stringify(value)); } catch {} },
            remove(key) { try { localStorage.removeItem(this._prefix + key); } catch {} },
        };

        function isWeChat() { return /MicroMessenger/i.test(navigator.userAgent); }
        function isIOS() { return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); }
        function sanitizeName(str) { return (str || 'download').replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, ' ').trim().substring(0, CONFIG.FILENAME_MAX_LEN); }
        function base64ToBuffer(b64) {
            const cleaned = b64.replace(/[^A-Za-z0-9+/=]/g, '');
            const raw = atob(cleaned);
            const buf = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
            return buf.buffer;
        }
        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            a.style.display = 'none';
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 3000);
        }
        function fillEmptyWithSpaces(data) {
            const result = {};
            for (const [key, val] of Object.entries(data)) {
                result[key] = (val === null || val === undefined || (typeof val === 'string' && val.trim() === '')) ? '   ' : val;
            }
            return result;
        }

        const Validators = {
            idCard(value) {
                if (!value || value.trim() === '') return { valid: true, msg: '' };
                const v = value.trim();
                if (!/^\d{17}[\dXx]$/.test(v)) return { valid: false, msg: '身份证号应为18位（末位可为X）' };
                const weights = [7,9,10,5,8,4,2,1,6,3,7,9,10,5,8,4,2];
                const checkCodes = '10X98765432';
                let sum = 0;
                for (let i = 0; i < 17; i++) sum += parseInt(v[i]) * weights[i];
                if (v[17].toUpperCase() !== checkCodes[sum % 11]) return { valid: false, msg: '身份证号校验位不正确' };
                return { valid: true, msg: '' };
            },
            phone(value) {
                if (!value || value.trim() === '') return { valid: true, msg: '' };
                const v = value.trim();
                return /^\d{11}$/.test(v) && /^1[3-9]\d{9}$/.test(v) ? { valid: true, msg: '' } : { valid: false, msg: '手机号应为11位有效号码' };
            },
            nonNegativeNumber(value) {
                if (!value || value.trim() === '') return { valid: true, msg: '' };
                const v = value.trim();
                const n = Number(v);
                if (isNaN(n) || n < 0) return { valid: false, msg: '请输入不小于0的数字' };
                return { valid: true, msg: '' };
            },
        };

        function debounce(fn, delay) {
            let timer;
            return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), delay); };
        }

                document.body.appendChild(overlay);
                const cleanup = () => overlay.remove();
                overlay.querySelector('#modal-cancel').addEventListener('click', () => { cleanup(); resolve(false); });
                overlay.querySelector('#modal-confirm').addEventListener('click', () => { cleanup(); resolve(true); });
                overlay.addEventListener('click', (e) => { if (e.target === overlay) { cleanup(); resolve(false); } });
                setTimeout(() => overlay.querySelector(danger ? '#modal-cancel' : '#modal-confirm')?.focus(), 100);
            });
        }

        function switchTab(tabName) {
            $$('.tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
            $$('.panel').forEach(p => p.classList.remove('active'));
            const tabEl = document.getElementById(`tab-${tabName}`);
            const panelEl = document.getElementById(`panel-${tabName}`);
            if (tabEl) { tabEl.classList.add('active'); tabEl.setAttribute('aria-selected', 'true'); }
            if (panelEl) panelEl.classList.add('active');
            
            if (tabName === 'property') loadFormData('property');
            else if (tabName === 'commitment') loadFormData('commitment');
            else if (tabName === 'guandu') loadFormData('guandu');
            else if (tabName === 'shixing') loadFormData('shixing');
            else if (tabName === 'public-roof') loadFormData('public-roof');
            
            Storage.set('activeTab', tabName);
        }

        function markError(el, msg) {
            el.classList.add('input-error'); el.classList.remove('input-valid');

            if (msg) Toast.warning(msg);
            const cleanup = () => { el.classList.remove('input-error'); el.removeEventListener('input', cleanup); el.removeEventListener('focus', cleanup); };
            el.addEventListener('input', cleanup, { once: true });
            el.addEventListener('focus', cleanup, { once: true });
            setTimeout(() => { if (el.classList.contains('input-error')) el.classList.remove('input-error'); }, 2500);

        function loadFormData(formType) {

        async function generateDoc({ template, data, requiredField, requiredName, fieldEl, filename, btnEl, imageBuffer = null }) {
            if (isWeChat()) {
                Toast.info('💡 请点击右上角「…」菜单，选择「在浏览器中打开」以支持文件下载');
                return;
            }
            const val = data[requiredField];
            if (!val || !String(val).trim()) {
                Toast.error(`请填写【${requiredName}】`);
                if (fieldEl) markError(fieldEl, `请填写${requiredName}`);
                return;
            }
            const origHTML = btnEl.innerHTML;
            btnEl.disabled = true;
            btnEl.classList.add('loading');
            try {
                if (!template || template.length < 200 || template.includes('在此粘贴')) {
                    throw new Error('文档模板未正确粘贴，请检查模板Base64');
                }
                const zip = new PizZip(base64ToBuffer(template));
                const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true, nullGetter: () => '' });

                // 渲染文本标签
                doc.render(fillEmptyWithSpaces(data));

                // 拦截底层的 ZIP 包，直接物理强制替换图片文件，绕过所有 XML 报错
                if (imageBuffer) {
                    const outZip = doc.getZip();
                    // 过滤出所有存储在 word/media 目录下的图片文件
                    const mediaFiles = Object.keys(outZip.files).filter(name => /^word\/media\/image\d+\.(png|jpe?g|gif|bmp)$/i.test(name));
                    if (mediaFiles.length > 0) {
                        // 覆盖所有探测到的图片文件，确保无漏网之鱼
                        mediaFiles.forEach(fileName => {
                            outZip.file(fileName, imageBuffer, { binary: true });
                        });
                        console.log(`成功拦截并覆写了 ${mediaFiles.length} 个媒体文件`);
                    } else {
                        console.warn('⚠️ ZIP 内未检测到 word/media/ 目录下的原生图片文件');
                    }
                }

                const blob = doc.getZip().generate({
                    type: 'blob',
                    mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                    compression: 'DEFLATE',
                });
                const safeName = sanitizeName(String(val).trim());
                downloadBlob(blob, `${safeName}-${filename}.docx`);
                Toast.success('✅ 文件已生成，请查看下载');
                if (isIOS()) setTimeout(() => Toast.info('💡 iOS用户：如未自动下载，请长按链接或使用Safari打开'), 1500);
            } catch (err) {
                console.error('文档生成失败:', err);
                if (err.message && (err.message.includes('size mismatch') || err.message.includes('corrupted') || err.message.includes('uncompressed'))) {
                    Toast.error('模板数据已损坏或不完整，请检查并重新粘贴完整的Base64模板');
                } else {
                    Toast.error(`生成失败：${err.message || '未知错误'}`);
                }
            } finally {
                btnEl.innerHTML = origHTML;
                btnEl.disabled = false;
                btnEl.classList.remove('loading');
                setTimeout(() => btnEl.focus(), 100);
            }
        }

        const calcHistory = [];
        let calcStorageLoaded = false;

        function loadCalcHistory() {
            if (calcStorageLoaded) return;
            calcStorageLoaded = true;
            const saved = Storage.get('calcHistory');
            if (Array.isArray(saved) && saved.length > 0) { calcHistory.push(...saved.slice(0, CONFIG.MAX_HISTORY)); renderHistory(); }
        }
        function saveCalcHistory() { Storage.set('calcHistory', calcHistory.slice(0, CONFIG.MAX_HISTORY)); }

        function computeRoot() {
            const input = document.getElementById('calc_input');
            const resultDiv = document.getElementById('calc-result');
            const value = input.value.trim();
            resultDiv.style.display = 'flex'; resultDiv.classList.remove('error');
            if (value === '') { resultDiv.innerHTML = '<span>⚠️ 请输入数字</span>'; resultDiv.classList.add('error'); markError(input); return; }
            const num = parseFloat(value);
            if (isNaN(num)) { resultDiv.innerHTML = '<span>⚠️ 无效数字</span>'; resultDiv.classList.add('error'); markError(input); return; }
            if (num < 0) { resultDiv.innerHTML = '<span>⚠️ 负数在实数范围内无平方根</span>'; resultDiv.classList.add('error'); return; }
            const root = Math.sqrt(num);
            let formatted;
            if (Number.isInteger(root)) formatted = root.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
            else if (Math.abs(root) < 0.0001) formatted = root.toExponential(6);
            else formatted = parseFloat(root.toPrecision(10)).toString();
            resultDiv.classList.remove('error');
            resultDiv.innerHTML = `<span>√<span style="font-family:var(--font-mono)">${formatDisplayNum(num)}</span> = </span><span class="result-value">${formatted}</span><button class="copy-btn" data-copy-value="${formatted.replace(/"/g, '&quot;')}" title="点击复制结果">📋 复制</button>`;
            calcHistory.unshift({ input: num, result: formatted, time: new Date().toLocaleTimeString('zh-CN', { hour12: false }) });
            if (calcHistory.length > CONFIG.MAX_HISTORY) calcHistory.pop();
            renderHistory(); saveCalcHistory();
            input.classList.remove('input-error');
        }
        function formatDisplayNum(num) {
            if (Number.isInteger(num) && Math.abs(num) < 1e15) return num.toLocaleString('zh-CN');
            if (Math.abs(num) >= 1e15 || (Math.abs(num) < 0.0001 && num !== 0)) return num.toExponential(4);
            return parseFloat(num.toPrecision(8)).toString();
        }
        function copyToClipboard(text) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => Toast.success('已复制到剪贴板')).catch(() => fallbackCopy(text));
            } else fallbackCopy(text);
        }
        function fallbackCopy(text) {
            const ta = document.createElement('textarea'); ta.value = text; ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0;';
            document.body.appendChild(ta); ta.select(); ta.setSelectionRange(0, text.length);
            try { document.execCommand('copy'); Toast.success('已复制'); } catch { Toast.error('复制失败，请手动复制'); }
            document.body.removeChild(ta);
        }
        function renderHistory() {
            const list = document.getElementById('history-list');
            if (calcHistory.length === 0) { list.innerHTML = '<div class="history-empty">📝 暂无计算记录</div>'; return; }
            list.innerHTML = calcHistory.map((h, i) => `
                <div class="history-item" data-index="${i}">
                    <span class="eq">√${formatDisplayNum(h.input)} = <strong>${h.result}</strong></span>
                    <span class="time">${h.time}</span>
                    <button class="del-hist" data-index="${i}" title="删除此条">×</button>
                </div>`).join('');
        }
        function deleteHistoryItem(index) { calcHistory.splice(index, 1); renderHistory(); saveCalcHistory(); Toast.info('已删除该记录'); }
        function clearCalculator() {
            if (calcHistory.length === 0 && document.getElementById('calc_input').value === '') { Toast.info('没有可清空的内容'); return; }
            showConfirm({ title: '清空计算器', message: '确定要清空所有计算历史和输入内容吗？', confirmText: '确认清空', danger: true })
            .then(confirmed => {
                if (!confirmed) return;
                calcHistory.length = 0; renderHistory(); saveCalcHistory();
                document.getElementById('calc-result').style.display = 'none';
                document.getElementById('calc_input').value = '';
                document.getElementById('calc_input').classList.remove('input-error', 'input-valid');
                Storage.remove('calcHistory'); Toast.info('计算器已清空');
            });
        }

        function bindEvents() {
            $$('.tab').forEach(tab => {
                tab.addEventListener('click', () => { const tabName = tab.getAttribute('data-tab'); if (tabName) switchTab(tabName); });
                tab.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); const tabName = tab.getAttribute('data-tab'); if (tabName) switchTab(tabName); } });
            });
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    const activePanel = document.querySelector('.panel.active');
                    if (!activePanel) return;
                    if (activePanel.id === 'panel-property') generateProperty();
                    else if (activePanel.id === 'panel-commitment') generateCommitment();
                    else if (activePanel.id === 'panel-guandu') generateGuandu();
                    else if (activePanel.id === 'panel-shixing') generateShixing();
                    else if (activePanel.id === 'panel-public-roof') generatePublicRoof();
                    else if (activePanel.id === 'panel-calculator') computeRoot();
                }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'Enter') {
                    e.preventDefault(); switchTab('calculator');
                    setTimeout(() => { document.getElementById('calc_input')?.focus(); computeRoot(); }, 150);
                }
                if (e.key === 'Escape') Toast.dismissAll();
            });
            document.getElementById('panel-property')?.addEventListener('input', (e) => { if (e.target.tagName === 'INPUT') { debouncedSaveProperty(); validateFieldLive(e.target); } });
            document.getElementById('panel-commitment')?.addEventListener('input', (e) => { if (e.target.tagName === 'INPUT') { debouncedSaveCommitment(); validateFieldLive(e.target); } });
            document.getElementById('panel-guandu')?.addEventListener('input', (e) => { if (e.target.tagName === 'INPUT') { debouncedSaveGuandu(); validateFieldLive(e.target); } });
            document.getElementById('panel-shixing')?.addEventListener('input', (e) => { if (e.target.tagName === 'INPUT') { debouncedSaveShixing(); validateFieldLive(e.target); } });
            document.getElementById('panel-public-roof')?.addEventListener('input', (e) => { if (e.target.tagName === 'INPUT') { debouncedSavePublicRoof(); validateFieldLive(e.target); } });
            
            document.getElementById('calc_input')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); computeRoot(); } });
            
            document.getElementById('btn-property')?.addEventListener('click', generateProperty);
            document.getElementById('btn-commitment')?.addEventListener('click', generateCommitment);
            document.getElementById('btn-guandu')?.addEventListener('click', generateGuandu);
            document.getElementById('btn-shixing')?.addEventListener('click', generateShixing);
            document.getElementById('btn-public-roof')?.addEventListener('click', generatePublicRoof);
            document.getElementById('btn-calc')?.addEventListener('click', computeRoot);
            
            document.getElementById('btn-clear-property')?.addEventListener('click', () => clearPanel('panel-property'));
            document.getElementById('btn-clear-commitment')?.addEventListener('click', () => clearPanel('panel-commitment'));
            document.getElementById('btn-clear-guandu')?.addEventListener('click', () => clearPanel('panel-guandu'));
            document.getElementById('btn-clear-shixing')?.addEventListener('click', () => clearPanel('panel-shixing'));
            document.getElementById('btn-clear-public-roof')?.addEventListener('click', () => clearPanel('panel-public-roof'));
            document.getElementById('btn-clear-calc')?.addEventListener('click', clearCalculator);
            
            document.getElementById('calc-result')?.addEventListener('click', (e) => {
                const btn = e.target.closest('.copy-btn');
                if (!btn) return;
                const value = btn.getAttribute('data-copy-value');
                if (value) { copyToClipboard(value); btn.classList.add('copied'); btn.textContent = '✅ 已复制'; setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '📋 复制'; }, 1800); }
            });
            document.getElementById('history-list')?.addEventListener('click', (e) => {
                const delBtn = e.target.closest('.del-hist');
                if (delBtn) { const index = parseInt(delBtn.getAttribute('data-index'), 10); if (!isNaN(index)) deleteHistoryItem(index); return; }
                const item = e.target.closest('.history-item');
                if (item && !e.target.closest('.del-hist')) {
                    const idx = parseInt(item.getAttribute('data-index'), 10);
                    if (!isNaN(idx) && calcHistory[idx]) { document.getElementById('calc_input').value = calcHistory[idx].input; document.getElementById('calc_input').focus(); Toast.info('已恢复输入值'); }
                }
            });
            
            document.addEventListener('visibilitychange', () => { 
                if (document.hidden) { 
                    saveFormData('property'); saveFormData('commitment'); saveFormData('guandu'); saveFormData('shixing'); saveFormData('public-roof'); saveCalcHistory(); 
                } 
            });
            window.addEventListener('beforeunload', () => { 
                saveFormData('property'); saveFormData('commitment'); saveFormData('guandu'); saveFormData('shixing'); saveFormData('public-roof'); saveCalcHistory(); 
            });
        }

        function validateFieldLive(input) {
            const id = input.id;
            if (id === 'prop_id_card' || id === 'comm_id_card' || id === 'gd_id_card' || id === 'sx_id_card' || id === 'pub_id_card') {
                if (input.value.trim() === '') { input.classList.remove('input-error', 'input-valid'); return; }
                const result = Validators.idCard(input.value);
                if (!result.valid && input.value.trim().length >= 18) { input.classList.add('input-error'); input.classList.remove('input-valid'); }
                else if (result.valid && input.value.trim().length === 18) markValid(input);
            }
            if (id === 'prop_phone' || id === 'pub_phone') {
                if (input.value.trim() === '') { input.classList.remove('input-error', 'input-valid'); return; }
                const result = Validators.phone(input.value);
                if (!result.valid && input.value.trim().length >= 11) { input.classList.add('input-error'); input.classList.remove('input-valid'); }
                else if (result.valid && input.value.trim().length === 11) markValid(input);
            }
            if (id === 'prop_floors' || id === 'pub_floors') {
                if (input.value.trim() === '') { input.classList.remove('input-error', 'input-valid'); return; }
                const result = Validators.nonNegativeNumber(input.value);
                if (!result.valid) { input.classList.add('input-error'); input.classList.remove('input-valid'); }
                else markValid(input);
            }
        }

        function init() {
            if (!TEMPLATE_PROPERTY || TEMPLATE_PROPERTY.length < 500 || TEMPLATE_PROPERTY.includes('在此粘贴')) console.warn('⚠️ 产权备案表模板未正确粘贴');
            if (!TEMPLATE_COMMITMENT || TEMPLATE_COMMITMENT.length < 500 || TEMPLATE_COMMITMENT.includes('在此粘贴')) console.warn('⚠️ 装修承诺函模板未正确粘贴');
            if (!TEMPLATE_GUANDU || TEMPLATE_GUANDU.length < 500) console.warn('⚠️ 官渡镇模板未正确粘贴');
            if (!TEMPLATE_SHIXING || TEMPLATE_SHIXING.length < 500) console.warn('⚠️ 始兴县模板未正确粘贴');
            if (!TEMPLATE_PUBLIC_ROOF || TEMPLATE_PUBLIC_ROOF.length < 500) console.warn('⚠️ 公屋屋顶模板未正确粘贴');
            
            const lastTab = Storage.get('activeTab', 'property');
            if (['property','commitment','guandu','shixing','public-roof','calculator'].includes(lastTab)) switchTab(lastTab);
            
            loadFormData('property'); 
            loadFormData('commitment'); 
            loadFormData('guandu'); 
            loadFormData('shixing'); 
            loadFormData('public-roof'); 
            loadCalcHistory();
            
            // 初始化官渡镇日期为今天
            const gdIssueDate = document.getElementById('gd_issue_date');
            if (gdIssueDate && !gdIssueDate.value) {
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                gdIssueDate.value = `${yyyy}-${mm}-${dd}`;
            }

            bindEvents();
            
            const calcPanel = document.getElementById('panel-calculator');
            if (calcPanel) {
                const observer = new MutationObserver(() => { if (calcPanel.classList.contains('active')) loadCalcHistory(); });
                observer.observe(calcPanel, { attributes: true, attributeFilter: ['class'] });
            }
            console.log('✅ 工具箱已就绪');
        }

        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
        else init();
    </script>
</body>
</html>
