<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>业务与计算工具箱 · 专业版</title>

    <!-- 依赖库 -->
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.37.11/build/docxtemplater.js"></script>

    <style>
        /* ========== 设计系统 ========== */
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #333;
            --text: #e0e0e0;
            --text-secondary: #999;
            --accent: #4f8cff;
            --accent-hover: #3a6fdf;
            --success: #2ed573;
            --warning: #ffa502;
            --danger: #ff4757;
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 8px 30px rgba(0,0,0,0.4);
            --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(79, 140, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(46, 213, 115, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 560px;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 28px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--success), var(--warning));
            opacity: 0.8;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.5px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        h1 span { font-size: 24px; }

        /* ========== 标签页 ========== */
        .tabs {
            display: flex;
            background: var(--surface2);
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            border-radius: 8px;
            transition: var(--transition);
            user-select: none;
            position: relative;
        }
        .tab:hover { color: #ccc; background: rgba(255,255,255,0.05); }
        .tab.active {
            color: #fff;
            background: var(--surface);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* ========== 面板 ========== */
        .panel {
            display: none;
            animation: fadeSlide 0.3s ease;
        }
        .panel.active { display: block; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            color: #b0b0b0;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .form-group label .required {
            color: var(--danger);
            font-weight: 700;
            margin-left: -8px;
        }
        input, textarea {
            width: 100%;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            color: #fff;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.2);
        }
        input.input-error {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.2);
        }
        ::placeholder { color: #555; }

        /* 隐藏数字输入框的微调器 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .row {
            display: flex;
            gap: 12px;
        }
        .row .form-group { flex: 1; }

        /* ========== 按钮系统 ========== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 12px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            color: #fff;
            background: var(--accent);
            width: 100%;
        }
        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(79,140,255,0.3); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; pointer-events: none; transform: none; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #26bc5a; }
        .btn-info { background: var(--accent); }
        .btn-warning { background: var(--warning); color: #000; }
        .btn-warning:hover { background: #e69500; }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 8px;
            font-weight: 500;
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.05); color: #ccc; }

        /* ========== 结果卡片 ========== */
        .result-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 18px;
            font-weight: 600;
            color: var(--success);
            transition: var(--transition);
            min-height: 56px;
        }
        .result-card.error {
            color: var(--danger);
            border-color: rgba(255,71,87,0.4);
        }
        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: #ccc;
            transition: var(--transition);
        }
        .copy-btn:hover { background: rgba(255,255,255,0.2); }

        .history-list {
            margin-top: 8px;
            max-height: 140px;
            overflow-y: auto;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #222;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }
        .toast {
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            background: #333;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            animation: toastInRight 0.3s ease, toastOut 0.3s ease 2.5s forwards;
            pointer-events: auto;
            max-width: 300px;
        }
        .toast-success { background: var(--success); }
        .toast-error { background: var(--danger); }
        .toast-info { background: var(--accent); }

        @keyframes toastInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100px); }
        }

        @media (max-width: 480px) {
            .container { padding: 16px; }
            .row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="toast-container" id="toastContainer"></div>

    <div class="container">
        <h1><span>🧰</span> 业务与计算工具箱</h1>

        <div class="tabs" role="tablist">
            <div class="tab active" id="tab-property" onclick="switchTab('property')">产权备案表</div>
            <div class="tab" id="tab-commitment" onclick="switchTab('commitment')">装修承诺函</div>
            <div class="tab" id="tab-calculator" onclick="switchTab('calculator')">平方根计算</div>
        </div>

        <!-- 产权备案表 -->
        <div class="panel active" id="panel-property">
            <form onsubmit="return false;">
                <div class="form-group">
                    <label><span class="required">*</span> 姓名</label>
                    <input type="text" id="prop_name" placeholder="如：张三" autocomplete="name">
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>项目地址</label>
                        <input type="text" id="prop_address" placeholder="详细地址" autocomplete="address">
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <input type="tel" id="prop_phone" placeholder="联系电话" autocomplete="tel">
                    </div>
                </div>
                <div class="form-group">
                    <label>身份证号</label>
                    <input type="text" id="prop_id_card" placeholder="18位身份证号" maxlength="18">
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>占地面积 (㎡)</label>
                        <input type="number" id="prop_area" placeholder="㎡" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>层数</label>
                        <input type="number" id="prop_floors" placeholder="层" min="1" step="1">
                    </div>
                </div>
                <div class="row">
                    <div class="form-group">
                        <label>建筑面积 (㎡)</label>
                        <input type="number" id="prop_build_area" placeholder="㎡" min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>建成日期</label>
                        <input type="text" id="prop_build_date" placeholder="如：2020" maxlength="5">
                    </div>
                </div>
            </form>
            <button id="btn-property" class="btn btn-success" onclick="generateProperty()">⚡ 生成产权及备案表</button>
            <button class="btn btn-ghost" onclick="clearPanel('panel-property')">🗑 清空表单</button>
        </div>

        <!-- 装修承诺函 -->
        <div class="panel" id="panel-commitment">
            <form onsubmit="return false;">
                <div class="form-group">
                    <label><span class="required">*</span> 承诺人姓名</label>
                    <input type="text" id="comm_name" placeholder="如：李四" autocomplete="name">
                </div>
                <div class="form-group">
                    <label>身份证号</label>
                    <input type="text" id="comm_id_card" placeholder="18位身份证号" maxlength="18">
                </div>
                <div class="form-group">
                    <label>项目地址</label>
                    <input type="text" id="comm_address" placeholder="详细地址" autocomplete="address">
                </div>
            </form>
            <button id="btn-commitment" class="btn btn-info" onclick="generateCommitment()">⚡ 一键生成承诺函</button>
            <button class="btn btn-ghost" onclick="clearPanel('panel-commitment')">🗑 清空表单</button>
        </div>

        <!-- 平方根计算器 -->
        <div class="panel" id="panel-calculator">
            <div class="form-group">
                <label>输入数字</label>
                <input type="number" id="calc_input" placeholder="请输入一个非负数" step="any"
                onkeypress="if(event.key==='Enter')computeRoot()">
            </div>
            <button class="btn btn-warning" onclick="computeRoot()">🔢 计算平方根</button>
            <div id="calc-result" class="result-card" style="display: none;"></div>
            <div class="history-list" id="history-list"></div>
            <button class="btn btn-ghost" onclick="clearCalculator()" style="margin-top:8px;">🗑 清空历史</button>
        </div>
    </div>

    // ---------- 全局配置 ----------
    const CONFIG = {
        TOAST_DURATION: 3000,
        STORAGE_PREFIX: 'toolbox_',
        MAX_HISTORY: 20,
    };

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => document.querySelectorAll(sel);

    const Toast = {
        container: document.getElementById('toastContainer'),
        show(msg, type='info') {
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            this.container.appendChild(t);
            setTimeout(() => t.remove(), CONFIG.TOAST_DURATION);
        },
        success(msg) { this.show(msg, 'success'); },
        error(msg) { this.show(msg, 'error'); },
        info(msg) { this.show(msg, 'info'); }
    };

    function isWeChat() {
        return /MicroMessenger/i.test(navigator.userAgent);
    }

    function sanitizeName(str) {
        return (str || 'download').replace(/[\\/:*?"<>|]/g, '_').trim().substring(0, 80);
    }

    function base64ToBuffer(b64) {
        const raw = atob(b64.replace(/[^A-Za-z0-9\+\/\=]/g, ''));
        const buf = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
        return buf.buffer;
    }

    function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename;
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
    }

    const Storage = {
        get(key, def = null) {
            try { const v = localStorage.getItem(CONFIG.STORAGE_PREFIX + key); return v ? JSON.parse(v) : def; }
            catch { return def; }
        },
        set(key, value) {
            try { localStorage.setItem(CONFIG.STORAGE_PREFIX + key, JSON.stringify(value)); } catch {}
        }
    };

    function switchTab(tab) {
        $$('.tab').forEach(t => t.classList.remove('active'));
        $$('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        document.getElementById(`panel-${tab}`).classList.add('active');
        if (tab === 'property') loadFormData('property');
        else if (tab === 'commitment') loadFormData('commitment');
    }

    function clearPanel(panelId) {
        const panel = document.getElementById(panelId);
        panel.querySelectorAll('input').forEach(inp => { inp.value = ''; inp.classList.remove('input-error'); });
        if (panelId === 'panel-calculator') {
            document.getElementById('calc-result').style.display = 'none';
        }
        Toast.info('已清空');
    }

    function markError(el) {
        el.classList.add('input-error');
        el.focus();
        setTimeout(() => el.classList.remove('input-error'), 2000);
    }

    function saveFormData(formType) {
        const fields = formType === 'property'
            ? ['prop_name','prop_address','prop_phone','prop_id_card','prop_area','prop_floors','prop_build_area','prop_build_date']
            : ['comm_name','comm_id_card','comm_address'];
        const data = {};
        fields.forEach(id => { data[id] = document.getElementById(id)?.value || ''; });
        Storage.set(formType, data);
    }

    function loadFormData(formType) {
        const data = Storage.get(formType);
        if (!data) return;
        Object.entries(data).forEach(([id, val]) => {
            const el = document.getElementById(id);
            if (el && !el.value) el.value = val;
        });
    }

    document.addEventListener('input', (e) => {
        if (e.target.closest('#panel-property')) saveFormData('property');
        else if (e.target.closest('#panel-commitment')) saveFormData('commitment');
    });

    /** 将所有空值字段替换为三个空格 | */
    function fillEmptyWithSpaces(data) {
        const result = {};
        for (const [key, val] of Object.entries(data)) {
            if (val === null || val === undefined || (typeof val === 'string' && val.trim() === '')) {
                result[key] = '   '; // 三个空格
            } else {
                result[key] = val;
            }
        }
        return result;
    }

    // 通用生成
    async function generateDoc({ template, data, requiredField, requiredName, fieldEl, filename, btnEl }) {
        if (isWeChat()) {
            Toast.info('请在浏览器中打开以支持下载');
            return;
        }

        const val = data[requiredField];
        if (!val || !String(val).trim()) {
            Toast.error(`请填写【${requiredName}】`);
            if (fieldEl) markError(fieldEl);
            return;
        }

        const origHTML = btnEl.innerHTML;
        btnEl.disabled = true;
        btnEl.innerHTML = '⏳ 正在生成文档...';

        try {
            if (!template || template.length < 100 || template.includes('在此粘贴')) {
                throw new Error('模板Base64代码未正确粘贴');
            }

            const zip = new PizZip(base64ToBuffer(template));
            const doc = new window.docxtemplater(zip, {
                paragraphLoop: true,
                linebreaks: true,
                nullGetter: () => '',   // 未提供标签默认空，但会被 fillEmptyWithSpaces 处理
            });

            // 渲染前用空格填充空值
            doc.render(fillEmptyWithSpaces(data));

            const blob = doc.getZip().generate({
                type: 'blob',
                mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                compression: 'DEFLATE',
            });

            const safeName = sanitizeName(String(val).trim());
            downloadBlob(blob, `${safeName}-${filename}.docx`);
            Toast.success('✅ 文件已生成，请查看下载');
        } catch (err) {
            console.error(err);
            Toast.error(`生成失败：${err.message}`);
        } finally {
            btnEl.innerHTML = origHTML;
            btnEl.disabled = false;
        }
    }

    function generateProperty() {
        let buildDate = document.getElementById('prop_build_date').value.trim();
        if (buildDate && /^\d+$/.test(buildDate)) buildDate += '年';

        const data = {
            '姓名': document.getElementById('prop_name').value.trim(),
            '地址': document.getElementById('prop_address').value.trim(),
            '手机号': document.getElementById('prop_phone').value.trim(),
            '身份证号': document.getElementById('prop_id_card').value.trim(),
            '占地面积': document.getElementById('prop_area').value.trim(),
            '层数': document.getElementById('prop_floors').value.trim(),
            '房屋建筑面积': document.getElementById('prop_build_area').value.trim(),
            '房屋建成日期': buildDate,
        };

        generateDoc({
            template: TEMPLATE_PROPERTY,
            data,
            requiredField: '姓名',
            requiredName: '姓名',
            fieldEl: document.getElementById('prop_name'),
            filename: '产权证明及备案表',
            btnEl: document.getElementById('btn-property'),
        });
    }

    function generateCommitment() {
        const data = {
            '承诺人姓名': document.getElementById('comm_name').value.trim(),
            '身份证号': document.getElementById('comm_id_card').value.trim(),
            '地址': document.getElementById('comm_address').value.trim(),
        };

        generateDoc({
            template: TEMPLATE_COMMITMENT,
            data,
            requiredField: '承诺人姓名',
            requiredName: '承诺人姓名',
            fieldEl: document.getElementById('comm_name'),
            filename: '承诺函',
            btnEl: document.getElementById('btn-commitment'),
        });
    }

    // 平方根计算器
    const calcHistory = [];

    function computeRoot() {
        const input = document.getElementById('calc_input');
        const resultDiv = document.getElementById('calc-result');
        const value = input.value.trim();

        resultDiv.style.display = 'block';
        resultDiv.classList.remove('error');

        if (value === '') {
            resultDiv.innerHTML = '⚠️ 请输入数字'; resultDiv.classList.add('error'); markError(input); return;
        }
        const num = parseFloat(value);
        if (isNaN(num)) {
            resultDiv.innerHTML = '⚠️ 无效数字'; resultDiv.classList.add('error'); markError(input); return;
        }
        if (num < 0) {
            resultDiv.innerHTML = '⚠️ 负数无实数平方根'; resultDiv.classList.add('error'); return;
        }

        const root = Math.sqrt(num);
        const formatted = Number.isInteger(root) ? root.toString() : parseFloat(root.toFixed(4)).toString();

        resultDiv.innerHTML = `√${num} = <strong>${formatted}</strong>
            <button class="copy-btn" onclick="copyToClipboard('${formatted}')">📋 复制</button>`;
        resultDiv.classList.remove('error');

        calcHistory.unshift({ input: num, result: formatted, time: new Date().toLocaleTimeString() });
        if (calcHistory.length > CONFIG.MAX_HISTORY) calcHistory.pop();
        renderHistory();
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            Toast.success('已复制到剪贴板');
        }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy');
            document.body.removeChild(ta);
            Toast.success('已复制');
        });
    }

    function renderHistory() {
        const list = document.getElementById('history-list');
        if (calcHistory.length === 0) { list.innerHTML = ''; return; }
        list.innerHTML = calcHistory.map(h =>
            `<div class="history-item"><span>√${h.input} = ${h.result}</span><span style="color:#666;font-size:11px">${h.time}</span></div>`
        ).join('');
    }

    function clearCalculator() {
        calcHistory.length = 0;
        renderHistory();
        document.getElementById('calc-result').style.display = 'none';
        document.getElementById('calc_input').value = '';
        Toast.info('已清空');
    }

    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
        if (!TEMPLATE_PROPERTY || TEMPLATE_PROPERTY.includes('在此粘贴'))
            console.warn('产权备案表模板未填充');
        if (!TEMPLATE_COMMITMENT || TEMPLATE_COMMITMENT.includes('在此粘贴'))
            console.warn('装修承诺函模板未填充');

        loadFormData('property');
        loadFormData('commitment');
    });
    </script>
</body>
</html>
