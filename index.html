<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>业务文档一键生成器</title>
    
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.4/dist/pizzip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.37.11/build/docxtemplater.js"></script>

    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Microsoft YaHei', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background-color: #2b2b2b;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        /* 标签页样式 */
        .tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #4a4a4a;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px 0;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #888888;
            transition: all 0.3s;
        }
        .tab.active {
            color: #ffffff;
            border-bottom: 3px solid #3b82f6;
            margin-bottom: -2px; /* 覆盖底部边框 */
        }
        
        /* 表单区域样式 */
        .form-section {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .form-section.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 15px;
        }
        label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #cfcfcf;
        }
        input {
            background-color: #383838;
            border: 1px solid #4a4a4a;
            color: #ffffff;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px; 
            outline: none;
        }
        input:focus {
            border-color: #3b82f6; 
        }
        input::placeholder {
            color: #888888;
        }
        
        /* 按钮样式 */
        .btn-green {
            background-color: #28a745;
        }
        .btn-green:hover {
            background-color: #218838;
        }
        .btn-blue {
            background-color: #007bff;
        }
        .btn-blue:hover {
            background-color: #0069d9;
        }
        button {
            width: 100%;
            color: white;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:disabled {
            background-color: #5a6268 !important;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 业务文档生成器</h2>

    <div class="tabs">
        <div class="tab active" id="tab-property" onclick="switchTab('property')">产权及备案表</div>
        <div class="tab" id="tab-commitment" onclick="switchTab('commitment')">装修承诺函</div>
    </div>

    <div id="section-property" class="form-section active">
        <div class="form-group">
            <label>姓名 *</label>
            <input type="text" id="prop_name" placeholder="如：张三">
        </div>
        <div class="form-group">
            <label>项目地址</label>
            <input type="text" id="prop_address" placeholder="详细地址">
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="text" id="prop_phone" placeholder="联系电话">
        </div>
        <div class="form-group">
            <label>身份证号</label>
            <input type="text" id="prop_id_card" placeholder="输入18位身份证号">
        </div>
        <div class="form-group">
            <label>占地面积 (㎡)</label>
            <input type="text" id="prop_area" placeholder="单位：㎡">
        </div>
        <div class="form-group">
            <label>层数</label>
            <input type="text" id="prop_floors" placeholder="如：3">
        </div>
        <div class="form-group">
            <label>房屋建筑面积 (㎡)</label>
            <input type="text" id="prop_build_area" placeholder="单位：㎡">
        </div>
        <div class="form-group">
            <label>房屋建成日期</label>
            <input type="text" id="prop_build_date" placeholder="仅填年份，如：2020">
        </div>
        <button id="btn_property" class="btn-green" onclick="generatePropertyDoc()">⚡ 生成产权及备案表</button>
    </div>

    <div id="section-commitment" class="form-section">
        <div class="form-group">
            <label>承诺人姓名 *</label>
            <input type="text" id="comm_name" placeholder="如：李四">
        </div>
        <div class="form-group">
            <label>身份证号</label>
            <input type="text" id="comm_id_card" placeholder="输入18位身份证号">
        </div>
        <div class="form-group">
            <label>项目地址</label>
            <input type="text" id="comm_address" placeholder="详细地址">
        </div>
        <button id="btn_commitment" class="btn-blue" onclick="generateCommitmentDoc()">⚡ 一键生成承诺函</button>
    </div>

</div>

    // ==========================================
    // 界面交互逻辑
    // ==========================================
    function switchTab(tabId) {
        // 重置所有标签和表单的状态
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
        
        // 激活当前点击的标签和对应的表单
        document.getElementById('tab-' + tabId).classList.add('active');
        document.getElementById('section-' + tabId).classList.add('active');
    }

    // ==========================================
    // 核心生成与下载逻辑 (公共方法)
    // ==========================================
    function base64ToArrayBuffer(base64) {
        const cleanBase64 = base64.replace(/[^A-Za-z0-9\+\/\=]/g, "");
        const binaryString = window.atob(cleanBase64);
        const len = binaryString.length;
        const bytes = new Uint8Array(len);
        for (let i = 0; i < len; i++) {
            bytes[i] = binaryString.charCodeAt(i);
        }
        return bytes.buffer;
    }

    // 检查微信和下载文件逻辑，提取为公共函数避免代码重复
    function processDownload(blob, outFileName) {
        var ua = navigator.userAgent.toLowerCase();
        var isIOS = /iphone|ipad|ipod/.test(ua);

        if (window.navigator && window.navigator.msSaveOrOpenBlob) {
            window.navigator.msSaveOrOpenBlob(blob, outFileName);
        } else if (isIOS) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const a = document.createElement('a');
                a.href = e.target.result;
                a.download = outFileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            reader.readAsDataURL(blob);
        } else {
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = outFileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(function() {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 1000);
        }
    }

    function checkWeChat() {
        var ua = navigator.userAgent.toLowerCase();
        if (ua.match(/MicroMessenger/i) == "micromessenger") {
            alert("⚠️ 微信内置浏览器不支持下载文件！\n\n请点击屏幕右上角的【...】图标，选择【在浏览器打开】或【在 Safari 中打开】。");
            return true;
        }
        return false;
    }

    // ==========================================
    // 产权及备案表生成逻辑
    // ==========================================
    function generatePropertyDoc() {
        if(checkWeChat()) return;

        const btn = document.getElementById("btn_property");
        btn.innerText = "⏳ 正在生成中，请稍候...";
        btn.disabled = true;

        setTimeout(() => {
            try {
                const name = document.getElementById('prop_name').value.trim();
                if (!name) {
                    alert("⚠️ 请至少填写【姓名】！");
                    return;
                }

                let buildDate = document.getElementById('prop_build_date').value.trim();
                if (buildDate && /^\d+$/.test(buildDate)) {
                    buildDate += "年";
                }

                const data = {
                    "姓名": name,
                    "地址": document.getElementById('prop_address').value.trim(),
                    "手机号": document.getElementById('prop_phone').value.trim(),
                    "身份证号": document.getElementById('prop_id_card').value.trim(),
                    "占地面积": document.getElementById('prop_area').value.trim(),
                    "层数": document.getElementById('prop_floors').value.trim(),
                    "房屋建筑面积": document.getElementById('prop_build_area').value.trim(),
                    "房屋建成日期": buildDate
                };

                const zip = new PizZip(base64ToArrayBuffer(TEMPLATE_PROPERTY));
                const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                doc.render(data);

                const blob = doc.getZip().generate({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    compression: "DEFLATE",
                });

                processDownload(blob, name + "-产权证明及备案表.docx");

            } catch (error) {
                alert("❌ 生成失败！\n\n错误详情：" + error.message);
            } finally {
                btn.innerText = "⚡ 生成产权及备案表";
                btn.disabled = false;
            }
        }, 100);
    }

    // ==========================================
    // 承诺函生成逻辑
    // ==========================================
    function generateCommitmentDoc() {
        if(checkWeChat()) return;

        const btn = document.getElementById("btn_commitment");
        btn.innerText = "⏳ 正在生成中，请稍候...";
        btn.disabled = true;

        setTimeout(() => {
            try {
                const name = document.getElementById('comm_name').value.trim();
                if (!name) {
                    alert("⚠️ 请至少填写【承诺人姓名】！");
                    return;
                }

                const data = {
                    "姓名": name,
                    "身份证号": document.getElementById('comm_id_card').value.trim(),
                    "地址": document.getElementById('comm_address').value.trim()
                };

                const zip = new PizZip(base64ToArrayBuffer(TEMPLATE_COMMITMENT));
                const doc = new window.docxtemplater(zip, { paragraphLoop: true, linebreaks: true });
                doc.render(data);

                const blob = doc.getZip().generate({
                    type: "blob",
                    mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
                    compression: "DEFLATE",
                });

                processDownload(blob, name + "-承诺函.docx");

            } catch (error) {
                alert("❌ 生成失败！\n\n错误详情：" + error.message);
            } finally {
                btn.innerText = "⚡ 一键生成承诺函";
                btn.disabled = false;
            }
        }, 100);
    }
</script>
